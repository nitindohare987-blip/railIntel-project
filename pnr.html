<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailIntel - PNR Status</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

/* BODY */
body{
background:linear-gradient(135deg,#0f172a,#1e293b,#312e81,#6366f1);
color:white;
min-height:100vh;
}

/* NAVBAR */
nav {
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.07);
position:sticky;
top:0;
}

.logo {
font-size:2.2rem;
font-weight:700;
color:#b026ff;
}

nav ul {
display:flex;
list-style:none;
gap:32px;
}

nav ul li a {
color:#94a3b8;
font-size:0.95rem;
text-decoration:none;
transition:0.2s;
}

nav ul li a:hover {
color:white;
}

/* HEADING */
h2{
text-align:center;
margin-top:40px;
color:#e2e8f0;
}

/* CARD */
.box{
width:90%;
max-width:420px;
margin:30px auto;
background:#020617;
padding:28px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.07);
display:flex;
flex-direction:column;
gap:14px;
}

/* INPUT */
input{
padding:12px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.1);
background:#0f172a;
color:white;
outline:none;
}

input:focus{
border-color:#6366f1;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4f46e5;
transform:translateY(-2px);
}

/* RESULT */
#result{
display:none;
padding:16px;
background:#0f172a;
border-radius:10px;
border:1px solid rgba(255,255,255,0.07);
line-height:1.8;
}

/* STATUS BADGES */
.badge{
padding:4px 10px;
border-radius:6px;
font-weight:600;
}

.cnf{ background:#16a34a; }
.wl{ background:#dc2626; }
.rac{ background:#f59e0b; }

</style>
</head>

<body>

<nav>
<div class="logo">रेल<span style="color:#94a3b8;">Intel</span></div>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">FAQs</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<h2>Check PNR Status</h2>

<div class="box">

<input type="text" id="pnrInput" placeholder="Enter PNR Number">

<button onclick="getPNR()">Check Status</button>

<button onclick="fillRandom()">🎲 Try Random PNR</button>

<div id="result"></div>

</div>

<script>

/* DATABASE */
const pnrDatabase = {
"1234567890": {
train_name: "Rajdhani Express",
train_number: "12951",
from: "Mumbai Central",
to: "New Delhi",
date: "12 Apr 2026",
status: "CNF",
coach: "B2",
seat: "45",
platform: "3"
},
"9876543210": {
train_name: "Shatabdi Express",
train_number: "12002",
from: "Bhopal",
to: "New Delhi",
date: "15 Apr 2026",
status: "WL 5",
coach: "-",
seat: "-",
platform: "1"
},
"4567891230": {
train_name: "Duronto Express",
train_number: "12213",
from: "Delhi",
to: "Mumbai",
date: "20 Apr 2026",
status: "RAC",
coach: "S5",
seat: "23",
platform: "5"
},
"1112223334": {
train_name: "Garib Rath",
train_number: "12909",
from: "Indore",
to: "Jaipur",
date: "18 Apr 2026",
status: "CNF",
coach: "G3",
seat: "12",
platform: "2"
}
};

/* MAIN FUNCTION */
function getPNR(){

const pnr = document.getElementById("pnrInput").value;
const resultBox = document.getElementById("result");

if(!pnr){
resultBox.style.display="block";
resultBox.innerHTML="⚠️ Please enter PNR number";
return;
}

const data = pnrDatabase[pnr];

resultBox.style.display="block";

if(data){

let statusClass = "";

if(data.status.includes("CNF")) statusClass = "cnf";
else if(data.status.includes("WL")) statusClass = "wl";
else statusClass = "rac";

resultBox.innerHTML =
"🚆 <b>" + data.train_name + " (" + data.train_number + ")</b><br>" +
"📍 " + data.from + " ➝ " + data.to + "<br>" +
"📅 Date: " + data.date + "<br>" +
"📊 Status: <span class='badge " + statusClass + "'>" + data.status + "</span><br>" +
"💺 Seat: " + data.coach + "-" + data.seat + "<br>" +
"🛤 Platform: " + data.platform;

}else{
resultBox.innerHTML = "❌ Invalid PNR Number";
}

}

/* RANDOM PNR */
function fillRandom(){
const keys = Object.keys(pnrDatabase);
const random = keys[Math.floor(Math.random()*keys.length)];
document.getElementById("pnrInput").value = random;
}

</script>

</body>
</html>
